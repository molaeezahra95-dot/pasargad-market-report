<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>گزارش پاسارگاد</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--bg:#f4f5f2;--card:#ffffff;--border:#e5e7eb;--up:#16a34a;--dn:#dc2626;--teal:#0891b2;--txt:#111827;--muted:#6b7280;}
body{font-family:'Vazirmatn',Tahoma,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;max-width:480px;margin:0 auto;height:100vh;}
.hdr{background:#fff;border-bottom:2px solid var(--gold);padding:12px 14px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-left{display:flex;align-items:center;gap:8px;}
.hdr-center{text-align:center;flex:1;}
.hdr-index{text-align:left;}
.idx-num{font-size:14px;font-weight:800;direction:ltr;}
.idx-chg{font-size:11px;font-weight:700;}
.update-info{font-size:11px;color:var(--muted);text-align:center;margin:6px 0;}
.page-tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;}
.ptab{padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.ptab.active{color:var(--gold);border-bottom-color:var(--gold);}
.slider-wrap{flex:1;overflow:hidden;position:relative;}
.slider{display:flex;height:100%;transition:transform .35s;}
.slide{min-width:100%;padding:8px 10px;display:flex;flex-direction:column;}
.sum-grid{flex:1;display:flex;flex-direction:column;gap:6px;}
.sum-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.sr-name{font-size:18px;font-weight:800;}
.sr-chg{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;}
.up{background:#f0fdf4;color:var(--up);}
.dn{background:#fef2f2;color:var(--dn);}
.sr-price{font-size:20px;font-weight:800;}
.update-bottom{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;padding:6px;background:#fff;border:1px solid var(--border);border-radius:8px;}
.stk-hero{background:#fff;border:1px solid var(--border);border-radius:12px;border-right:4px solid var(--gold);padding:10px;display:flex;gap:12px;margin-bottom:6px;}
.sh-name{font-size:19px;font-weight:800;}
.sh-price-big{font-size:22px;font-weight:800;}
.sec-lbl{font-size:9px;font-weight:700;color:var(--gold);margin:4px 0;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.cell{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;}
.cl{font-size:9px;color:var(--muted);}
.cv{font-size:16px;font-weight:800;}
.c-up{color:var(--up);} .c-dn{color:var(--dn);} .c-gold{color:var(--gold);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left"></div>
    <div class="hdr-center"><div style="font-size:13px;font-weight:800;color:var(--gold);">گروه مالی پاسارگاد</div></div>
    <div class="hdr-index">
      <div class="idx-num">۵,۱۷۶,۳۵۵</div>
      <div class="idx-chg idx-up">(+۰.۳%)</div>
      <div style="font-size:9px;color:var(--muted);">شاخص کل</div>
    </div>
  </div>
  <div class="update-info">آخرین به‌روزرسانی: ۱۴۰۵/۰۴/۰۶ - ۱۵:۵۹</div>
  <div class="page-tabs" id="pageTabs"></div>
</div>

<div class="slider-wrap" id="wrap">
  <div class="slider" id="slider"></div>
</div>

<script>
const stocks = [{"name": "وپاسار", "status": "مجاز", "lastPrice": 1073, "closingPrice": 1074, "prevPrice": 1062, "change": 1.04, "closingChange": 1.13, "volume": 250623691, "value": 2691877164110, "retailBuy": 145680359, "retailSell": 158986531, "instBuy": 104943332, "instSell": 91637160, "moneyFlow": -142908287280, "avgVolume": 76827490, "marketCap": 504.23, "capital": 46.95, "retailBuyCnt": 0, "retailSellCnt": 0, "instBuyCnt": 0, "instSellCnt": 0, "stale": false}, {"name": "آریان", "status": "مجاز", "lastPrice": 521, "closingPrice": 527, "prevPrice": 517, "change": 0.77, "closingChange": 1.93, "volume": 7470255, "value": 39403238870, "retailBuy": 7460255, "retailSell": 3919499, "instBuy": 10000, "instSell": 3550756, "moneyFlow": 18659784120, "avgVolume": 21655409, "marketCap": 79.05, "capital": 15.0, "retailBuyCnt": 0, "retailSellCnt": 0, "instBuyCnt": 0, "instSellCnt": 0, "stale": false}, {"name": "بپاس", "status": "مجاز", "lastPrice": 808, "closingPrice": 807, "prevPrice": 785, "change": 2.93, "closingChange": 2.8, "volume": 26648711, "value": 215079959900, "retailBuy": 16803247, "retailSell": 10165782, "instBuy": 9845464, "instSell": 16482929, "moneyFlow": 53564342550, "avgVolume": 14589446, "marketCap": 83.52, "capital": 10.35, "retailBuyCnt": 0, "retailSellCnt": 0, "instBuyCnt": 0, "instSellCnt": 0, "stale": false}, {"name": "میدکو", "status": "مجاز", "lastPrice": 734, "closingPrice": 730, "prevPrice": 716, "change": 2.51, "closingChange": 1.96, "volume": 67934237, "value": 495823402970, "retailBuy": 21321224, "retailSell": 47402134, "instBuy": 46613013, "instSell": 20532103, "moneyFlow": -190390643000, "avgVolume": 63789697, "marketCap": 211.7, "capital": 29.0, "retailBuyCnt": 0, "retailSellCnt": 0, "instBuyCnt": 0, "instSellCnt": 0, "stale": false}, {"name": "اتکای", "status": "مجاز", "lastPrice": 230, "closingPrice": 226, "prevPrice": 232, "change": -0.9, "closingChange": -2.54, "volume": 11724808, "value": 26524162517, "retailBuy": 4462567, "retailSell": 1305715, "instBuy": 7262241, "instSell": 10419093, "moneyFlow": 7140799224, "avgVolume": 6018695, "marketCap": 4.52, "capital": 2.0, "retailBuyCnt": 0, "retailSellCnt": 0, "instBuyCnt": 0, "instSellCnt": 0, "stale": false}];
const update_text = "آخرین به‌روزرسانی: ۱۴۰۵/۰۴/۰۶ - ۱۵:۵۹";
let curSi = 0;

function nVol(n) { if(!n) return '—'; var m=n/1e6; return m>=1 ? parseFloat(m.toFixed(1)).toLocaleString('fa-IR') : n.toLocaleString('fa-IR'); }
function uVol(n) { return n>=1e6 ? 'میلیون سهم' : 'سهم'; }
function nVal(n) { if(!n) return '—'; var b=n/1e10; return b>=1 ? parseFloat(b.toFixed(1)).toLocaleString('fa-IR') : parseFloat((b*1000).toFixed(0)).toLocaleString('fa-IR'); }
function uVal(n) { return n/1e10 >=1 ? 'میلیارد تومان' : 'میلیون تومان'; }
function nMC(n) { if(!n) return '—'; var v=parseFloat(n); return (v>=10?Math.round(v):parseFloat(v.toFixed(1))).toLocaleString('fa-IR'); }
function cc(c) { return c>0?'up':c<0?'dn':'zt'; }

function cell(lbl, num, unit, cls) {
  return `<div class="cell"><div class="cl">${lbl}</div><div class="cv ${cls}">${num} <span class="cu">${unit}</span></div></div>`;
}

function buildSummary() {
  var html = '<div class="sum-grid">';
  stocks.forEach((s,i) => {
    var sign = s.change>0 ? '+' : '';
    html += `<div class="sum-row" onclick="goSlide(${i+1})">`
      + `<div class="sr-name">${s.name}</div>`
      + `<div class="sr-chg ${cc(s.change)}">${sign}${s.change}%</div>`
      + `<div style="flex:1;text-align:left;"><div class="sr-price">${(s.lastPrice||0).toLocaleString('fa-IR')} تومان</div></div>`
      + `</div>`;
  });
  html += `</div><div class="update-bottom">${update_text}</div>`;
  return html;
}

function buildDetail(s) {
  var html = `<div class="stk-hero">`
    + `<div><div class="sh-name">${s.name}</div><div style="font-size:9px;padding:2px 8px;border-radius:12px;background:#f0fdf4;color:var(--up);display:inline-block;">${s.status}</div></div>`
    + `<div style="text-align:left;"><div style="font-size:11px;color:#666;">آخرین معامله</div><div style="font-size:22px;font-weight:800;">${(s.lastPrice||0).toLocaleString('fa-IR')}</div><div style="font-size:11px;color:#666;">تومان</div></div>`
    + `</div>`;

  html += `<div style="margin:8px 0 4px;font-size:9px;font-weight:700;color:var(--gold);">اطلاعات کلیدی</div><div class="g4">`
    + cell('قیمت دیروز', (s.prevPrice||0).toLocaleString('fa-IR'), 'تومان', '')
    + cell('قیمت پایانی', (s.closingPrice||0).toLocaleString('fa-IR'), 'تومان', '')
    + cell('سرمایه', (s.capital||0).toLocaleString('fa-IR'), 'همت', 'c-gold')
    + cell('ارزش بازار', nMC(s.marketCap), 'همت', 'c-gold')
    + `</div>`;

  html += `<div style="margin:8px 0 4px;font-size:9px;font-weight:700;color:var(--gold);">حجم و ارزش</div><div class="g3">`
    + cell('حجم معاملات', nVol(s.volume), uVol(s.volume), 'c-teal')
    + cell('میانگین حجم ماه', nVol(s.avgVolume), uVol(s.avgVolume), '')
    + cell('ارزش معاملات', nVal(s.value), uVal(s.value), '')
    + `</div>`;

  return html;
}

function goSlide(si) {
  curSi = si;
  document.getElementById('slider').style.transform = `translateX(-${si*100}%)`;
}

function init() {
  var names = ['خلاصه'].concat(stocks.map(s => s.name));
  document.getElementById('pageTabs').innerHTML = names.map((n,i) => `<button class="ptab ${i===0?'active':''}" onclick="goSlide(${i})">${n}</button>`).join('');
  var slides = ['<div class="slide">' + buildSummary() + '</div>'];
  stocks.forEach(s => slides.push('<div class="slide">' + buildDetail(s) + '</div>'));
  document.getElementById('slider').innerHTML = slides.join('');
}

init();
</script>
</body>
</html>
