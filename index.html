<html lang="fa" dir="rtl">

<title>گزارش پاسارگاد</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c9a84c;--bg:#f4f5f2;--card:#ffffff;
  --border:#e5e7eb;--up:#16a34a;--dn:#dc2626;
  --teal:#0891b2;--txt:#111827;--muted:#6b7280;
}
body{
  font-family:'Vazirmatn',Tahoma,sans-serif;
  background:var(--bg);color:var(--txt);
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;overflow:hidden;
  height:100vh;height:100dvh;
}
.hdr{
  background:#fff;border-bottom:2px solid var(--gold);
  box-shadow:0 2px 8px rgba(0,0,0,.06);padding:10px 14px 0;flex-shrink:0;
}
.hdr-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:6px;gap:4px;}
.hdr-index{text-align:right;}
.idx-num{font-size:14px;font-weight:800;color:var(--txt);direction:ltr;}
.idx-chg{font-size:11px;font-weight:700;}
.idx-lbl{font-size:9px;color:var(--muted);}
.idx-up{color:var(--up);} .idx-dn{color:var(--dn);}
.hdr-center{text-align:center;}
.hdr-title{font-size:12px;font-weight:800;color:var(--gold);white-space:nowrap;}
.hdr-right{text-align:left;}
.hdr-date{font-size:11px;font-weight:700;background:var(--gold);color:#fff;padding:2px 8px;border-radius:12px;display:inline-block;}
.hdr-upd{font-size:9px;color:var(--muted);margin-top:2px;}
.page-tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow:hidden;scrollbar-width:none;flex-shrink:0;justify-content:space-between;}
.page-tabs::-webkit-scrollbar{display:none;}
.ptab{
  padding:7px 3px;font-size:10.5px;font-weight:700;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  font-family:'Vazirmatn',sans-serif;
  background:none;border-top:none;border-left:none;border-right:none;
  transition:all .2s;flex:1 1 0;min-width:0;text-align:center;
}
.ptab.active{color:var(--gold);border-bottom-color:var(--gold);}
.slider-wrap{flex:1;overflow:hidden;position:relative;}
.slider{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;}
.slide{min-width:100%;height:100%;overflow:hidden;padding:8px 10px;display:flex;flex-direction:column;}
/* summary */
.slide-sum{display:flex;flex-direction:column;}
.sum-grid{flex:1;display:flex;flex-direction:column;gap:5px;min-height:0;}
.sum-row{
  flex:1;min-height:0;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .15s;
}
.sum-row:active{box-shadow:0 3px 10px rgba(0,0,0,.1);}
.sr-main{display:flex;flex-direction:column;min-width:185px;gap:5px;}
.sr-head{display:flex;align-items:baseline;gap:9px;white-space:nowrap;}
.sr-name{font-size:18px;font-weight:800;color:var(--txt);}
.sr-chg{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;direction:ltr;min-width:62px;text-align:center;}
.sr-chg-row{display:flex;justify-content:flex-start;padding-right:42px;}
.up{background:#f0fdf4;color:var(--up);border:1px solid #bbf7d0;}
.dn{background:#fef2f2;color:var(--dn);border:1px solid #fecaca;}
.zt{background:#f9fafb;color:var(--muted);border:1px solid var(--border);}
.sr-price{font-size:18px;font-weight:800;color:var(--txt);}
.sr-price-unit{font-size:10px;color:var(--muted);font-weight:700;margin-right:3px;}
.sr-stale{color:var(--muted) !important;font-size:17px !important;}
.stale-tag{font-size:9px;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;padding:1px 6px;margin-top:2px;display:inline-block;}
.sr-metrics{flex:1;display:flex;flex-direction:column;gap:4px;align-items:stretch;min-width:0;}
.sr-m{font-size:11px;background:#f9fafb;border:1px solid var(--border);border-radius:7px;padding:4px 7px;color:var(--txt);white-space:nowrap;font-weight:700;text-align:center;}
.hint{font-size:10px;color:var(--muted);text-align:center;margin-top:8px;padding:4px;}
/* detail */
.stk-hero{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  border-right:3px solid var(--gold);padding:7px 10px 6px;
  display:grid;grid-template-columns:auto 1fr;align-items:center;gap:8px;
  margin-bottom:4px;box-shadow:0 2px 6px rgba(0,0,0,.06);flex-shrink:0;
}
.sh-name-col{text-align:right;}
.sh-name{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:2px;}
.sh-badge{display:inline-block;font-size:9px;padding:1px 7px;border-radius:14px;font-weight:700;}
.ok{background:#f0fdf4;color:var(--up);border:1px solid #bbf7d0;}
.stop{background:#fef2f2;color:var(--dn);border:1px solid #fecaca;}
.sh-price-col{display:flex;flex-direction:column;gap:4px;}
.sh-price-row{display:flex;align-items:baseline;gap:4px;}
.sh-plbl{font-size:8px;color:var(--muted);font-weight:700;}
.sh-pval{font-size:16px;font-weight:800;}
.sh-pval-big{font-size:28px;font-weight:800;}
.sh-pchg{font-size:10px;font-weight:800;padding:2px 6px;border-radius:14px;direction:ltr;}
.day-candle{direction:ltr;min-width:0;height:49px;position:relative;padding:1px 8px 0;}
.dc-title{font-size:8px;font-weight:700;color:var(--muted);text-align:center;direction:rtl;line-height:10px;}
.dc-track{width:34px;height:34px;position:relative;margin:1px auto 0;}
.dc-shadow{position:absolute;width:2px;left:50%;transform:translateX(-50%);border-radius:2px;}
.dc-body{position:absolute;width:11px;left:50%;transform:translateX(-50%);border-radius:2px;border:1px solid rgba(0,0,0,.08);}
.dc-doji{position:absolute;width:15px;height:2px;left:50%;transform:translate(-50%,-1px);border-radius:2px;}
.dc-up{background:var(--up);color:var(--up);}
.dc-down{background:var(--dn);color:var(--dn);}
.dc-flat{background:var(--gold);color:var(--gold);}
.dc-shadow.dc-up{background:var(--up);}
.dc-shadow.dc-down{background:var(--dn);}
.dc-shadow.dc-flat{background:var(--gold);}
.dc-doji.dc-flat{background:var(--gold);}
.dc-empty{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);direction:rtl;}
.sec-lbl{font-size:9px;font-weight:700;color:var(--gold);border-right:2px solid var(--gold);padding-right:5px;margin:2px 0 3px;flex-shrink:0;}
.slide-det{display:flex;flex-direction:column;gap:8px;}
.det-sec{display:flex;flex-direction:column;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;}
.cell{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 7px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.cl{font-size:9px;color:var(--muted);margin-bottom:2px;font-weight:600;}
.cv{font-size:17px;font-weight:800;white-space:nowrap;}
.cv-wrap{display:flex;direction:rtl;align-items:baseline;gap:3px;justify-content:center;}
.cu{font-size:11px;color:var(--muted);}
.g4 .cv{font-size:16px;}
.g4 .cu{font-size:10px;}
.g4 .cl{font-size:9px;}
.c-up{color:var(--up);} .c-dn{color:var(--dn);}
.c-teal{color:var(--teal);} .c-gold{color:var(--gold);}
.c-txt{color:var(--txt);} .c-muted{color:var(--muted);}
/* حقیقی/حقوقی table */
.ii-wrap{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);flex:1;display:flex;flex-direction:column;}
.ii-hdr{display:grid;grid-template-columns:36px 1fr 1fr;background:#f9fafb;border-bottom:1px solid var(--border);flex-shrink:0;}
.ii-hdr-lbl{padding:4px;}
.ii-hdr-col{padding:6px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border-right:1px solid var(--border);}
.ii-row{flex:1;display:grid;grid-template-columns:36px 1fr 1fr;border-bottom:1px solid var(--border);}
.ii-row:last-child{border-bottom:none;}
.ii-row-lbl{
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;
  writing-mode:vertical-rl;text-orientation:mixed;
}
.ii-buy-lbl{background:#fff;color:var(--up);}
.ii-sell-lbl{background:#fff;color:var(--dn);}
.ii-cell{padding:6px 6px;text-align:center;border-right:1px solid var(--border);}
.ii-cell:last-child{border-right:none;}
.ii-vw{display:flex;direction:rtl;justify-content:center;align-items:baseline;gap:2px;}
.ii-vol{font-size:14px;font-weight:800;}
.ii-u{font-size:10px;color:var(--muted);}
.ii-pct{font-size:9px;font-weight:700;color:var(--muted);margin-top:1px;}
.ii-cnt{font-size:8px;color:var(--muted);}
.ii-buy{background:#fff;}
.ii-sell{background:#fff;}
</style>
</head>

    + '</div>'
    + '<div class="ii-row">'
    + '<div class="ii-row-lbl ii-buy-lbl">خرید</div>'
    + '<div class="ii-cell ii-buy"><div class="ii-vol c-up">' + nVol(rB) + '<span class="ii-u"> ' + uVol(rB) + '</span></div><div class="ii-pct">' + rBp + '%</div>' + (rBc ? '<div class="ii-cnt">' + rBc.toLocaleString('fa-IR') + ' نفر</div>' : '') + '</div>'
    + '<div class="ii-cell"><div class="ii-vol c-up">' + nVol(iB) + '<span class="ii-u"> ' + uVol(iB) + '</span></div><div class="ii-pct">' + iBp + '%</div>' + (iBc ? '<div class="ii-cnt">' + iBc.toLocaleString('fa-IR') + ' نفر</div>' : '') + '</div>'
    + '</div>'
    + '<div class="ii-row">'
    + '<div class="ii-row-lbl ii-sell-lbl">فروش</div>'
    + '<div class="ii-cell ii-sell"><div class="ii-vol c-dn">' + nVol(rS) + '<span class="ii-u"> ' + uVol(rS) + '</span></div><div class="ii-pct">' + rSp + '%</div>' + (rSc ? '<div class="ii-cnt">' + rSc.toLocaleString('fa-IR') + ' نفر</div>' : '') + '</div>'
    + '<div class="ii-cell ii-sell"><div class="ii-vol c-dn">' + nVol(iS) + '<span class="ii-u"> ' + uVol(iS) + '</span></div><div class="ii-pct">' + iSp + '%</div>' + (iSc ? '<div class="ii-cnt">' + iSc.toLocaleString('fa-IR') + ' نفر</div>' : '') + '</div>'
    + '</div>'
    + '</div>';
}

function buildDayCandle(s) {
  var o = Number(s.openPrice || 0);
  var c = Number(s.lastPrice || 0);
  var h = Number(s.highPrice || 0);
  var l = Number(s.lowPrice || 0);
  if (!o || !c || !h || !l) {
    return '<div class="day-candle"><div class="dc-empty">دادهٔ کندل موجود نیست</div></div>';
  }

  /* برای مقاومت در برابر داده ناقص API، ابتدا OHLC را به بازه معتبر می‌بریم. */
  h = Math.max(h, o, c);
  l = Math.min(l, o, c);
  var bodyTop = Math.max(o, c);
  var bodyBottom = Math.min(o, c);
  var bodyHeightValue = bodyTop - bodyBottom;
  var upperShadowValue = h - bodyTop;
  var lowerShadowValue = bodyBottom - l;
  var totalHeight = h - l;

  /* تبدیل نسبت‌های قیمتی به مختصات عمودی کوچک داخل کارت */
  var priceY = function(v) {
    return totalHeight > 0 ? 2 + ((h - v) / totalHeight * 30) : 17;
  };
  var highY = priceY(h);
  var bodyTopY = priceY(bodyTop);
  var bodyBottomY = priceY(bodyBottom);
  var lowY = priceY(l);
  var bodyHeightPx = totalHeight > 0 ? (bodyHeightValue / totalHeight * 30) : 0;
  var upperShadowPx = totalHeight > 0 ? (upperShadowValue / totalHeight * 30) : 0;
  var lowerShadowPx = totalHeight > 0 ? (lowerShadowValue / totalHeight * 30) : 0;
  var isDoji = Math.abs(c - o) < 0.0001;
  var cls = c > o ? 'dc-up' : (c < o ? 'dc-down' : 'dc-flat');
  var bodyHtml = isDoji
    ? '<div class="dc-doji dc-flat" style="top:' + bodyTopY + 'px"></div>'
    : '<div class="dc-body ' + cls + '" style="top:' + bodyTopY + 'px;height:' + Math.max(bodyHeightPx, 1) + 'px"></div>';
  var tip = 'مبنای بازار: ' + Number(s.prevPrice || 0).toLocaleString('fa-IR')
    + ' | O: ' + o.toLocaleString('fa-IR')
    + ' | H: ' + h.toLocaleString('fa-IR')
    + ' | L: ' + l.toLocaleString('fa-IR')
    + ' | C: ' + c.toLocaleString('fa-IR') + ' تومان';

  return '<div class="day-candle" title="' + tip + '">'
    + '<div class="dc-title">کندل روز</div>'
    + '<div class="dc-track">'
    + '<div class="dc-shadow ' + cls + '" style="top:' + highY + 'px;height:' + upperShadowPx + 'px"></div>'
    + '<div class="dc-shadow ' + cls + '" style="top:' + bodyBottomY + 'px;height:' + lowerShadowPx + 'px"></div>'
    + bodyHtml
    + '</div>'
    + '</div>';
}

function buildDetail(s) {
  var sign = s.change > 0 ? '+' : '';
  var chgStr = sign + s.change + '%';
  var sBadge = s.status === 'مجاز' ? 'ok' : 'stop';
  var pCls = cv(s.change);
  var fCls = (s.moneyFlow || 0) >= 0 ? 'c-up' : 'c-dn';
  var fNum = nFlow(s.moneyFlow);


  /* hero */
  var html = '<div class="stk-hero">'
    + '<div class="sh-name-col">'
    + '<div class="sh-name">' + s.name + '</div>'
    + '<div class="sh-badge ' + sBadge + '">' + s.status + '</div>'
    + '</div>'
    + '<div class="sh-price-col">'
    + '<div class="sh-price-row">'
    + '<span class="sh-pval-big ' + pCls + '">' + (s.lastPrice || 0).toLocaleString('fa-IR') + '</span>'
    + '<span class="sh-plbl">تومان</span>'
    + '<span class="sh-pchg ' + cc(s.change) + '">' + chgStr + '</span>'
    + '</div>'
    + '</div>'
    + '</div>';

  /* باکس ۱ (بدون عنوان): قیمت دیروز | قیمت پایانی | سرمایه | ارزش بازار */
  html += '<div class="det-sec">'
    + '<div class="g4">'
    + cell('قیمت دیروز', (s.prevPrice || 0).toLocaleString('fa-IR'), 'تومان', 'c-muted')
    + cell('قیمت پایانی', (s.closingPrice || 0).toLocaleString('fa-IR'), 'تومان', 'c-muted')
    + cell('سرمایه', parseFloat((s.capital || 0).toFixed(1)).toLocaleString('fa-IR'), 'همت', 'c-gold')
    + cell('ارزش بازار', nMC(s.marketCap), 'همت', 'c-gold')
    + '</div></div>';

  /* باکس ۲ (بدون عنوان): حجم معاملات | میانگین حجم ماه | ارزش معاملات */
  html += '<div class="det-sec">'
    + '<div class="g3">'
    + cell('حجم معاملات', nVol(s.volume), uVol(s.volume), 'c-teal')
    + cell('میانگین حجم ماه', nVol(s.avgVolume), uVol(s.avgVolume), 'c-muted')
    + cell('ارزش معاملات', nVal(s.value), uVal(s.value), 'c-txt')
    + '</div></div>';

  /* row 3: ورود پول */
  html += '<div class="det-sec">'
    + '<div class="sec-lbl">ورود پول حقیقی</div>'
    + '<div class="cell">'
    + (fNum !== '—'
      ? '<div class="cv ' + fCls + '">' + fNum + '<span class="cu"> میلیارد تومان</span></div>'
      : '<div class="cv c-muted">—</div>')
    + '</div></div>';

  /* row 4: حقیقی/حقوقی */
  html += '<div class="det-sec">'
    + '<div class="sec-lbl">حقیقی / حقوقی</div>'
    + buildII(s)
    + '</div>';

  return html;
}

function goSlide(si) {
  curSi = si;
  document.getElementById('slider').style.transform = 'translateX(' + (si * 100) + '%)';
  document.querySelectorAll('.ptab').forEach(function(t, i) { t.classList.toggle('active', i === si); });
  var tabs = document.querySelectorAll('.ptab');
  if (tabs[si]) tabs[si].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function init() {
  var names = ['خلاصه'].concat(stocks.map(function(s) { return s.name; }));
  document.getElementById('pageTabs').innerHTML = names.map(function(n, i) {
    return '<button class="ptab' + (i === 0 ? ' active' : '') + '" onclick="goSlide(' + i + ')">' + n + '</button>';
  }).join('');

  var slides = ['<div class="slide slide-sum">' + buildSummary() + '</div>'];
  stocks.forEach(function(s) { slides.push('<div class="slide slide-det">' + buildDetail(s) + '</div>'); });
  document.getElementById('slider').innerHTML = slides.join('');
}

var startX = 0;
document.getElementById('wrap').addEventListener('touchstart', function(e) {
  startX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('wrap').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - startX;
  var total = stocks.length + 1;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && curSi < total - 1) goSlide(curSi + 1);
    else if (dx > 0 && curSi > 0)   goSlide(curSi - 1);
  }
});

init();
</script>
</body>
</html>
